# Builds and deploys the meeting-costs app to Bunny.net Edge Storage (Stockholm),
# then purges the CDN pull zone cache.
#
# Required secrets (set in GitHub repo Settings > Secrets and variables > Actions):
#   BUNNY_STORAGE_PASSWORD    — storage zone API key (FTP & API Access, not read-only)
#   BUNNY_PULL_ZONE_ID   — numeric pull zone ID from the Bunny dashboard URL

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Biome check
        run: npx biome check .

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
          
      - name: Upload to Bunny Edge Storage
        env:
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
        run: |
          find dist/ -type f | while read -r file; do
            remote_path="${file#dist/}"
            curl --fail --silent --show-error \
              -X PUT \
              -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}" \
              "https://se.storage.bunnycdn.com/${BUNNY_STORAGE_ZONE}/${remote_path}"
          done

      - name: Purge CDN cache
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "AccessKey: ${BUNNY_API_KEY}" \
            -H "Content-Length: 0" \
            "https://api.bunny.net/pullzone/${BUNNY_PULL_ZONE_ID}/purgeCache"
