# Deploy — meetings.faffweasel.com
#
# Triggers on push to main. Runs lint, tests, and build, then uploads
# the dist/ directory to Bunny Edge Storage (Stockholm region) and purges
# the pull zone cache.
#
# Required secrets (GitHub repo Settings > Secrets and variables > Actions):
#   BUNNY_API_KEY           — account-level API key, used for cache purge
#   BUNNY_STORAGE_PASSWORD  — storage zone FTP/API password (not read-only)
#   BUNNY_STORAGE_ZONE      — storage zone name
#   BUNNY_PULL_ZONE_ID      — numeric pull zone ID from the Bunny dashboard URL

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and format check
        run: npx biome check .

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Delete stale files from Bunny Edge Storage
        env:
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
        run: |
          ENDPOINT="https://se.storage.bunnycdn.com"

          list_remote() {
            local path="$1"
            curl -s -X GET \
              "${ENDPOINT}/${BUNNY_STORAGE_ZONE}/${path}" \
              -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
              -H "Accept: application/json"
          }

          collect_remote_files() {
            local dir="$1"
            local listing
            listing=$(list_remote "$dir")
            echo "$listing" | jq -r '.[] | if .IsDirectory then empty else .Path + .ObjectName end' 2>/dev/null || true
            echo "$listing" | jq -r '.[] | select(.IsDirectory) | .Path + .ObjectName + "/"' 2>/dev/null | while IFS= read -r subdir; do
              collect_remote_files "$subdir"
            done
          }

          cd dist
          LOCAL_FILES=$(find . -type f | sed 's|^\./|/'"${BUNNY_STORAGE_ZONE}"'/|')
          cd ..

          collect_remote_files "" | while IFS= read -r remote_file; do
            [ -z "$remote_file" ] && continue
            if ! echo "$LOCAL_FILES" | grep -qF "$remote_file"; then
              echo "Deleting stale: $remote_file"
              curl -s -X DELETE \
                "${ENDPOINT}${remote_file}" \
                -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
                --fail \
                || echo "WARNING: failed to delete $remote_file"
            fi
          done

      - name: Upload to Bunny Edge Storage
        env:
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
        run: |
          mime_type() {
            case "${1##*.}" in
              html)        echo "text/html" ;;
              css)         echo "text/css" ;;
              js)          echo "application/javascript" ;;
              json)        echo "application/json" ;;
              svg)         echo "image/svg+xml" ;;
              png)         echo "image/png" ;;
              jpg|jpeg)    echo "image/jpeg" ;;
              ico)         echo "image/x-icon" ;;
              woff2)       echo "font/woff2" ;;
              woff)        echo "font/woff" ;;
              txt)         echo "text/plain" ;;
              xml)         echo "application/xml" ;;
              webmanifest) echo "application/manifest+json" ;;
              *)           echo "application/octet-stream" ;;
            esac
          }

          cache_header() {
            case "$1" in
              index.html) echo "no-cache" ;;
              assets/*)   echo "max-age=31536000, immutable" ;;
              *)          echo "max-age=86400" ;;
            esac
          }

          ENDPOINT="https://se.storage.bunnycdn.com"
          cd dist
          find . -type f | while read -r file; do
            filepath="${file#./}"
            content_type=$(mime_type "$filepath")
            cache_control=$(cache_header "$filepath")
            echo "Uploading: $filepath ($content_type, $cache_control)"
            curl -s -X PUT \
              "${ENDPOINT}/${BUNNY_STORAGE_ZONE}/${filepath}" \
              -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
              -H "Content-Type: ${content_type}" \
              -H "Cache-Control: ${cache_control}" \
              --upload-file "$filepath" \
              --fail \
              || { echo "FAILED: $filepath"; exit 1; }
          done

      - name: Purge CDN cache
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
        run: |
          curl -s -X POST \
            "https://api.bunny.net/pullzone/${BUNNY_PULL_ZONE_ID}/purgeCache" \
            -H "AccessKey: ${BUNNY_API_KEY}" \
            --fail
